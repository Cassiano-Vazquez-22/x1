<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X1 seu Noob?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.2);
            border: 2px solid #ccff00;
            max-width: 420px;
            width: 90%;
            z-index: 10;
        }
        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccff00;
            margin-bottom: 15px;
        }
        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            color: #e2e8f0;
            margin-bottom: 35px;
            font-weight: 500;
        }
        .btn-container {
            display: flex;
            flex-direction: column; /* Alinha os botões verticalmente no início */
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 130px; /* Aumentado para dar espaço vertical entre eles */
        }
        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        #btn-sim {
            background-color: #ccff00;
            color: #000000;
            box-shadow: 0 4px 15px rgba(204, 255, 0, 0.4);
            transition: transform 0.1s;
            width: 100%; /* Ocupa o espaço horizontal do container */
            max-width: 280px;
        }
        #btn-sim:hover {
            transform: scale(1.1);
            background-color: #b3ff00;
        }
        #btn-nao {
            background-color: #333333;
            color: #ffffff;
            border: 1px solid #444444;
            transition: left 0.2s ease, top 0.2s ease; 
            z-index: 999;
            width: 100%;
            max-width: 250px;
            /* Removido o posicionamento absoluto inicial para ele não sobrepor */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bora X1 comigo? </h1>
        <p>Ou está com medo?</p>
        
        <div class="btn-container">
            <button id="btn-sim" onclick="confirmarTreino()">estou com Muito medo </button>
            <button id="btn-nao" onmouseover="fugir()" onclick="fugir()" ontouchstart="fugir()">Bora que eu vou te amassar 🔥</button>
        </div>
    </div>

    <script>
        function fugir() {
            const botaoNao = document.getElementById('btn-nao');
            const botaoSim = document.getElementById('btn-sim');
            
            const rectSim = botaoSim.getBoundingClientRect();
            
            const margem = 50;
            const larguraJanela = window.innerWidth - botaoNao.offsetWidth - margem;
            const alturaJanela = window.innerHeight - botaoNao.offsetHeight - margem;
            
            let novoX, novoY;
            let muitoPerto = true;

            while (muitoPerto) {
                novoX = Math.random() * (larguraJanela - margem) + margem;
                novoY = Math.random() * (alturaJanela - margem) + margem;

                const distanciaX = Math.abs(novoX - rectSim.left);
                const distanciaY = Math.abs(novoY - rectSim.top);

                if (distanciaX > 150 || distanciaY > 150) {
                    muitoPerto = false;
                }
            }
            
            // Só vira 'fixed' no momento em que a pessoa tenta interagir
            botaoNao.style.position = 'fixed';
            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

        function confirmarTreino() {
            const mensagem = encodeURIComponent("estou com medo! ");
            window.location.href = `https://wa.me/55DDDNÚMERO?text=${mensagem}`; 
        }
    </script>
</body>
</html>

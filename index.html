<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Pronto! 🪂🔫</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* Fonte robusta bem estilo jogo de tiro militar */
            font-family: 'Impact', 'Arial Black', sans-serif;
            /* Fundo escuro texturizado com gradiente */
            background: linear-gradient(135deg, #0d0e11, #1f2229);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: rgba(18, 20, 26, 0.95);
            padding: 35px;
            border-radius: 4px; /* Bordas mais retas estilo caixas militar */
            /* Sombra laranja neon lembrando a fumaça do Air Drop */
            box-shadow: 0 0 30px rgba(245, 124, 0, 0.3);
            border: 3px solid #f57c00; /* Laranja clássico do PUBG */
            max-width: 420px;
            width: 90%;
            z-index: 10;
        }
        h1 {
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f57c00;
            margin-bottom: 15px;
            text-shadow: 2px 2px #000000;
        }
        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            color: #9ea5b4;
            margin-bottom: 35px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 130px;
        }
        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            border: none;
            border-radius: 4px; /* Botão quadrado/militar */
            cursor: pointer;
            letter-spacing: 1px;
        }
        #btn-sim {
            background: linear-gradient(to bottom, #ff9800, #e65100);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.4);
            border: 1px solid #ffb74d;
            text-shadow: 1px 1px #000000;
            transition: transform 0.1s;
            width: 100%;
            max-width: 280px;
        }
        #btn-sim:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        #btn-nao {
            background-color: #2b303c;
            color: #717b91;
            border: 1px solid #41495a;
            transition: left 0.2s ease, top 0.2s ease; 
            z-index: 999;
            width: 100%;
            max-width: 250px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WINNER WINNER CHICKEN DINNER? 🪂</h1>
        <p>O squad tá chamando. Bora dropar em Pochinki hoje e buscar esse top 1?</p>
        
        <div class="btn-container">
            <button id="btn-sim" onclick="confirmarTreino()">BORA PRO COLO, SQUAD! 🔥</button>
            <button id="btn-nao" onmouseover="fugir()" onclick="fugir()" ontouchstart="fugir()">VOU PIPOCAR EM CASA 💤</button>
        </div>
    </div>

    <script>
        function fugir() {
            const botaoNao = document.getElementById('btn-nao');
            const botaoSim = document.getElementById('btn-sim');
            
            const rectSim = botaoSim.getBoundingClientRect();
            
            const margem = 50;
            const larguraJanela = window.innerWidth - botaoNao.offsetWidth - margem;
            const alturaJanela = window.innerHeight - botaoNao.offsetHeight - margem;
            
            let novoX, novoY;
            let muitoPerto = true;

            while (muitoPerto) {
                novoX = Math.random() * (larguraJanela - margem) + margem;
                novoY = Math.random() * (alturaJanela - margem) + margem;

                const distanciaX = Math.abs(novoX - rectSim.left);
                const distanciaY = Math.abs(novoY - rectSim.top);

                if (distanciaX > 150 || distanciaY > 150) {
                    muitoPerto = false;
                }
            }
            
            botaoNao.style.position = 'fixed';
            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X1 noob 🪂🔫</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #0d0e11, #1f2229);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: rgba(18, 20, 26, 0.95);
            padding: 35px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(245, 124, 0, 0.3);
            border: 3px solid #f57c00;
            max-width: 420px;
            width: 90%;
            z-index: 10;
        }
        h1 {
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f57c00;
            margin-bottom: 15px;
            text-shadow: 2px 2px #000000;
        }
        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            color: #9ea5b4;
            margin-bottom: 35px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 140px; /* Garante o espaço reservado para o botão fixo */
        }
        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        #btn-sim {
            background: linear-gradient(to bottom, #ff9800, #e65100);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.4);
            border: 1px solid #ffb74d;
            text-shadow: 1px 1px #000000;
            transition: transform 0.1s;
            width: 100%;
            max-width: 280px;
        }
        #btn-sim:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        #btn-nao {
            background-color: #2b303c;
            color: #717b91;
            border: 1px solid #41495a;
            /* Transição suave de movimento */
            transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            z-index: 999;
            width: 100%;
            max-width: 250px;
            position: fixed; /* Já inicia como fixo para habilitar a animação */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>X1 ? 🪂</h1>
        <p>Tá com medo?</p>
        
        <div class="btn-container">
            <button id="btn-sim" onclick="confirmarTreino()"> Estou com medo</button>
            <button id="btn-nao" onmouseover="fugir()" onclick="fugir()" ontouchstart="fugir()">Bora, vou te amassar</button>
        </div>
    </div>

    <script>
        // Função para posicionar o botão NÃO logo abaixo do SIM assim que a página carrega
        function posicionarBotaoInicial() {
            const botaoSim = document.getElementById('btn-sim');
            const botaoNao = document.getElementById('btn-nao');
            const rectSim = botaoSim.getBoundingClientRect();
            
            // Centraliza horizontalmente com o botão sim e joga 70px para baixo
            botaoNao.style.left = (rectSim.left + (botaoSim.offsetWidth / 2) - (botaoNao.offsetWidth / 2)) + 'px';
            botaoNao.style.top = (rectSim.top + 70) + 'px';
        }

        // Executa o posicionamento inicial assim que a tela carrega e se mudar o tamanho da janela
        window.addEventListener('DOMContentLoaded', posicionarBotaoInicial);
        window.addEventListener('resize', posicionarBotaoInicial);

            const larguraJanela = window.innerWidth - botaoNao.offsetWidth - margem;
            const alturaJanela = window.innerHeight - botaoNao.offsetHeight - margem;
